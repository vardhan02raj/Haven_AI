name: CI/CD Pipeline to AWS Kubernetes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Replace with your actual DockerHub username if you prefer
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/haven-ai-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/haven-ai-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://52.66.79.240:5016

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Kubernetes Images
        run: |
          cd k8s
          # Since we are using standard deployment yamls, we can use sed to update the image tag to the unique git sha
          sed -i "s|image: ruva02/haven-ai-backend:latest|image: $BACKEND_IMAGE:${{ github.sha }}|g" backend-deployment.yaml
          sed -i "s|image: ruva02/haven-ai-frontend:latest|image: $FRONTEND_IMAGE:${{ github.sha }}|g" frontend-deployment.yaml

      - name: Deploy to AWS Kubernetes
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Apply Manifests
        run: |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/ingress.yaml
